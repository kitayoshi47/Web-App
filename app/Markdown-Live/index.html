<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor & Previewer</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify to prevent XSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        /* Custom styles for the markdown content */
        .prose h1 { border-bottom: 2px solid #eaecef; padding-bottom: 0.3em; margin-bottom: 16px; font-size: 1.8em; font-weight: bold; }
        .prose h2 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 24px; margin-bottom: 16px; font-size: 1.4em; font-weight: bold; }
        .prose h3 { margin-top: 24px; margin-bottom: 16px; font-size: 1.2em; font-weight: bold; }
        .prose p { margin-bottom: 16px; line-height: 1.6; }
        .prose code { background-color: #f6f8fa; padding: 0.2em 0.4em; border-radius: 6px; font-family: monospace; }
        .prose pre { background-color: #f6f8fa; padding: 16px; border-radius: 6px; overflow: auto; margin-bottom: 16px; }
        .prose ul { list-style-type: disc; padding-left: 2em; margin-bottom: 16px; }
        .prose ol { list-style-type: decimal; padding-left: 2em; margin-bottom: 16px; }
        .prose blockquote { border-left: 4px solid #dfe2e5; color: #6a737d; padding-left: 16px; margin-bottom: 16px; }
        .prose table { border-collapse: collapse; width: 100%; margin-bottom: 16px; }
        .prose th, .prose td { border: 1px solid #dfe2e5; padding: 6px 13px; }
        .prose tr:nth-child(even) { background-color: #f6f8fa; }
        
        /* Layout adjustments */
        #editor { scrollbar-width: thin; }
        #preview { scrollbar-width: thin; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b px-6 py-3 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
            <h1 class="text-xl font-bold text-gray-800">Markdown Live</h1>
        </div>
        <div class="flex gap-3">
            <button id="downloadBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm transition flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                .md保存
            </button>
            <button id="clearBtn" class="border border-gray-300 hover:bg-gray-100 text-gray-600 px-4 py-2 rounded-lg text-sm transition">
                クリア
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col md:flex-row overflow-hidden">
        <!-- Editor Section -->
        <section class="w-full md:w-1/2 flex flex-col border-r h-1/2 md:h-full bg-white">
            <div class="bg-gray-100 px-4 py-1 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b">
                Editor (Markdown)
            </div>
            <textarea id="editor" class="flex-grow p-6 focus:outline-none font-mono text-gray-800 resize-none leading-relaxed" placeholder="# ここにMarkdownを入力してください..."></textarea>
        </section>

        <!-- Preview Section -->
        <section class="w-full md:w-1/2 flex flex-col h-1/2 md:h-full bg-white">
            <div class="bg-gray-100 px-4 py-1 text-xs font-semibold text-gray-500 uppercase tracking-wider border-b">
                Preview
            </div>
            <div id="preview" class="flex-grow p-8 overflow-y-auto prose max-w-none text-gray-800">
                <!-- Markdown content will be rendered here -->
            </div>
        </section>
    </main>

    <!-- Success Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none">
        メッセージがここに表示されます
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');

        // Initial content
        const initialText = `# Markdownへようこそ！

これは、ブラウザ上で動く**リアルタイムMarkdownエディタ**です。

## 主な機能
1. **即時プレビュー**: 入力した内容がすぐに右側に表示されます。
2. **.md保存**: 作成した内容をファイルとしてダウンロードできます。
3. **セキュリティ**: サニタイズ処理を行っているため、安心して利用できます。

### コードの書き方
\`\`\`javascript
function hello() {
  console.log("Hello, Markdown!");
}
\`\`\`

### リストの例
- 箇条書き1
- 箇条書き2
  - ネストした項目

> 「書くことは、考えることである」と言われます。
> このツールがあなたの創作を助けることを願っています！
`;

        // Load content or use initial
        editor.value = localStorage.getItem('mdContent') || initialText;

        // Render function
        function updatePreview() {
            const rawValue = editor.value;
            // Parse markdown and sanitize HTML
            const html = DOMPurify.sanitize(marked.parse(rawValue));
            preview.innerHTML = html;
            // Auto-save to localStorage
            localStorage.setItem('mdContent', rawValue);
        }

        // Show toast notification
        function showToast(message) {
            toast.innerText = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 2000);
        }

        // Event Listeners
        editor.addEventListener('input', updatePreview);

        // Download functionality
        downloadBtn.addEventListener('click', () => {
            const blob = new Blob([editor.value], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.md';
            a.click();
            URL.revokeObjectURL(url);
            showToast('ファイルをダウンロードしました！');
        });

        // Clear functionality
        clearBtn.addEventListener('click', () => {
            if (editor.value === '') return;
            // Custom dialog
            const confirmClear = confirm('内容をすべて消去しますか？（保存されていない内容は失われます）');
            if (confirmClear) {
                editor.value = '';
                updatePreview();
                showToast('クリアしました');
            }
        });

        // Initialize on load
        window.onload = updatePreview;

        // Synchronize scrolling (Optional, basic implementation)
        editor.addEventListener('scroll', () => {
            const scrollPercentage = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
            preview.scrollTop = scrollPercentage * (preview.scrollHeight - preview.clientHeight);
        });
    </script>
</body>
</html>
